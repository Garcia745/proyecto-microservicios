spring.application.name=notificaciones-service
server.port=8084

# Mongo
spring.data.mongodb.uri=${MONGO_URI}

# RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST}
spring.rabbitmq.port=${RABBITMQ_PORT}
spring.rabbitmq.username=${RABBITMQ_USERNAME}
spring.rabbitmq.password=${RABBITMQ_PASSWORD}

# nombres
rabbitmq.exchange=empleados.exchange
rabbitmq.queue.notificaciones=notificaciones-queue
rabbitmq.queue.creado=notificaciones-creado-queue
rabbitmq.queue.eliminado=notificaciones-eliminado-queue
rabbitmq.routingkey.creado=empleado.creado
rabbitmq.routingkey.eliminado=empleado.eliminado
