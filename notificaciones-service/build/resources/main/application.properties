spring.application.name=notificaciones-service
server.port=8084

# Mongo
spring.data.mongodb.uri=${MONGO_URI}

# RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST}
spring.rabbitmq.port=${RABBITMQ_PORT}
spring.rabbitmq.username=${RABBITMQ_USERNAME}
spring.rabbitmq.password=${RABBITMQ_PASSWORD}

# --- Configuraciˇn de Actuator ---
management.endpoints.web.exposure.include=health,prometheus
management.endpoint.health.show-details=always

# =========================================
# TRACING / ZIPKIN
# =========================================
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://zipkin:9411/api/v2/spans

# nombres
rabbitmq.exchange=empleados.exchange
rabbitmq.queue.notificaciones=notificaciones-queue
rabbitmq.queue.creado=notificaciones-creado-queue
rabbitmq.queue.eliminado=notificaciones-eliminado-queue
rabbitmq.routingkey.creado=empleado.creado
rabbitmq.routingkey.eliminado=empleado.eliminado
