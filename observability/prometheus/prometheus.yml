global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s

scrape_configs:

  - job_name: 'empleados-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['empleados-service:8080']

  - job_name: 'perfiles-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['perfiles-service:8083']

  - job_name: 'notificaciones-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['notificaciones-service:8084']

  - job_name: 'departamentos-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['departamentos-service:8081']

  - job_name: 'prometheus'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['prometheus:9090']
